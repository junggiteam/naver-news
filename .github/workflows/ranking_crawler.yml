name: Ranking News Crawler

on:
  # schedule 트리거는 master_scheduler.yml로 이전됨 (10분마다 목표 시각 확인 후 실행).
  # GitHub Actions의 schedule은 public 저장소에서 best-effort라 실행 누락이 잦아
  # 이 워크플로우는 이제 수동 실행(workflow_dispatch) 용도로만 유지한다.
  workflow_dispatch: # 필요할 때 깃허브 웹에서 수동 실행 가능

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 필요한 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 크롤러 실행 (데이터 수집)
        run: python scraper_ranking.py

      - name: 깃허브에 데이터 저장 (Push)
        run: |
          git config --local user.email "junggiteam@gmail.com"
          git config --local user.name "junggiteam"
          git add data/ranking_news.json

          git diff --staged --quiet || git commit -m "Auto update: Ranking news data"

          git pull --rebase origin main
          git push origin main
