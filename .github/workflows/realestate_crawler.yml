name: Realestate News Crawler

on:
  schedule:
    # 한국 시간(KST) 기준: 매일 00:12, 07:12, 12:12, 15:12, 18:12, 21:12
    # UTC 기준: 전날 15:12, 당일 22:12, 03:12, 06:12, 09:12, 12:12
    # 정각(0분) 집중을 피하기 위해 12분으로 스태거링
    - cron: '12 15,22,3,6,9,12 * * *'
  workflow_dispatch: # 필요할 때 깃허브 웹에서 수동 실행 가능

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설치하기
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 필요한 라이브러리 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 크롤러 실행 (데이터 수집)
        run: python scraper_realestate.py

      - name: 깃허브에 데이터 저장 (Push)
        run: |
          git config --local user.email "junggiteam@gmail.com"
          git config --local user.name "junggiteam"
          git add data/realestate_news.json

          git diff --staged --quiet || git commit -m "Auto update: Realestate news data"

          git pull --rebase origin main
          git push origin main
